name: Horosa Windows Installer Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing git tag to publish or repair
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  release-desktop:
    runs-on: windows-latest

    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: |
          git config --system core.longpaths true

      - name: Checkout repository
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Checkout requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            desktop_installer_bundle/package-lock.json
            local/workspace/**/astrostudyui/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: '3.9.9'

      - name: Resolve project directory
        id: resolve-project
        shell: pwsh
        run: |
          $workspaceRoot = Join-Path $env:GITHUB_WORKSPACE 'local\workspace'
          $projectDir = Get-ChildItem -Path $workspaceRoot -Directory |
            Where-Object {
              (Test-Path (Join-Path $_.FullName 'astrostudyui')) -and
              (Test-Path (Join-Path $_.FullName 'astrostudysrv')) -and
              (Test-Path (Join-Path $_.FullName 'astropy'))
            } |
            Sort-Object Name |
            Select-Object -First 1
          if (-not $projectDir) {
            throw "Unable to locate Horosa project directory under $workspaceRoot"
          }
          "PROJECT_DIR=$($projectDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Validate installer release tag
        shell: pwsh
        run: |
          if (-not ($env:RELEASE_TAG -match '^v\d+\.\d+\.\d+$')) {
            throw "Installer release tag must match v<major>.<minor>.<patch>. Current: $env:RELEASE_TAG"
          }

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location (Join-Path $env:PROJECT_DIR 'astrostudyui')
          try {
            npm ci --no-audit --no-fund
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Standard npm ci hit a peer dependency conflict, retrying with --legacy-peer-deps..."
              npm ci --no-audit --no-fund --legacy-peer-deps
              if ($LASTEXITCODE -ne 0) {
                throw "Frontend npm ci failed after --legacy-peer-deps retry."
              }
            }
          } finally {
            Pop-Location
          }

      - name: Install desktop bundle dependencies
        shell: pwsh
        run: |
          Push-Location (Join-Path $env:GITHUB_WORKSPACE 'desktop_installer_bundle')
          npm ci
          Pop-Location

      - name: Build frontend dist-file
        shell: pwsh
        run: |
          Push-Location (Join-Path $env:PROJECT_DIR 'astrostudyui')
          npm run build:file
          Pop-Location

      - name: Build backend jar
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $serviceRoot = Join-Path $env:PROJECT_DIR 'astrostudysrv'
          $moduleBuildOrder = @(
            'boundless',
            'image',
            'basecomm',
            'astrostudy',
            'astrostudycn',
            'astrodeeplearn',
            'astroreader',
            'astroesp'
          )

          foreach ($module in $moduleBuildOrder) {
            $pomPath = Join-Path $serviceRoot "$module\pom.xml"
            Write-Host "Building backend module: $module"
            mvn -f $pomPath -DskipTests install
            if ($LASTEXITCODE -ne 0) {
              throw "Maven install failed for module: $module"
            }
          }

          $bootPomPath = Join-Path $serviceRoot 'astrostudyboot\pom.xml'
          Write-Host 'Packaging astrostudyboot'
          mvn -f $bootPomPath -DskipTests package
          if ($LASTEXITCODE -ne 0) {
            throw 'Maven package failed for astrostudyboot'
          }

      - name: Prepare runtime from source
        shell: pwsh
        run: |
          $env:HOROSA_PROJECT_DIR = $env:PROJECT_DIR
          $global:LASTEXITCODE = 0
          & ./prepareruntime/Prepare_Runtime_Windows.ps1 -NoPause
          if (-not $?) {
            throw 'Prepare_Runtime_Windows.ps1 failed.'
          }
          $global:LASTEXITCODE = 0

      - name: Build installer release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location (Join-Path $env:GITHUB_WORKSPACE 'desktop_installer_bundle')
          try {
            npm run build:desktop
            if ($LASTEXITCODE -ne 0) {
              throw 'npm run build:desktop failed.'
            }

            npx electron-builder --dir
            if ($LASTEXITCODE -ne 0) {
              throw 'electron-builder --dir failed.'
            }

            $cacheRoots = @(
              $env:ELECTRON_BUILDER_CACHE,
              (Join-Path ($env:LOCALAPPDATA ?? '') 'electron-builder\Cache'),
              (Join-Path ($env:USERPROFILE ?? '') 'AppData\Local\electron-builder\Cache')
            ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique

            $rcedit = $null
            foreach ($cacheRoot in $cacheRoots) {
              if (-not (Test-Path $cacheRoot)) { continue }
              $candidate = Get-ChildItem -Path $cacheRoot -Recurse -Filter 'rcedit-x64.exe' -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTimeUtc -Descending |
                Select-Object -First 1
              if ($candidate) {
                $rcedit = $candidate.FullName
                break
              }
            }
            if (-not $rcedit) {
              throw 'Unable to locate rcedit-x64.exe in electron-builder cache.'
            }
            Write-Host "Using RCEDIT_PATH=$rcedit"
            $env:RCEDIT_PATH = $rcedit

            npm run patch:win-icon
            if ($LASTEXITCODE -ne 0) {
              throw 'npm run patch:win-icon failed.'
            }

            npx electron-builder --win nsis --prepackaged release/win-unpacked
            if ($LASTEXITCODE -ne 0) {
              throw 'electron-builder NSIS packaging failed.'
            }
          } finally {
            Pop-Location
          }

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Horosa Windows ${{ env.RELEASE_TAG }}
          body_path: ./docs/releases/${{ env.RELEASE_TAG }}.md
          draft: false
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ./desktop_installer_bundle/release/Horosa-Setup-*.exe

      - name: Remove non-installer release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $release = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json assets | ConvertFrom-Json
          $assets = @($release.assets)
          foreach ($asset in $assets) {
            if ($asset.name -notlike 'Horosa-Setup-*.exe') {
              Write-Host "Deleting disallowed release asset: $($asset.name)"
              gh api `
                --method DELETE `
                -H "Accept: application/vnd.github+json" `
                "/repos/$env:GITHUB_REPOSITORY/releases/assets/$($asset.id)"
            }
          }
