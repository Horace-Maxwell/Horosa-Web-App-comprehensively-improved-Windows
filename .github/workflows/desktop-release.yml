name: Horosa Windows Stable Release

on:
  push:
    tags:
      - 'windows-stable-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing git tag to publish or repair
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  release-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Checkout requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            desktop_installer_bundle/package-lock.json
            local/workspace/**/astrostudyui/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: '3.9.9'

      - name: Resolve project directory
        id: resolve-project
        shell: pwsh
        run: |
          $workspaceRoot = Join-Path $env:GITHUB_WORKSPACE 'local\workspace'
          $projectDir = Get-ChildItem -Path $workspaceRoot -Directory |
            Where-Object {
              (Test-Path (Join-Path $_.FullName 'astrostudyui')) -and
              (Test-Path (Join-Path $_.FullName 'astrostudysrv')) -and
              (Test-Path (Join-Path $_.FullName 'astropy'))
            } |
            Sort-Object Name |
            Select-Object -First 1
          if (-not $projectDir) {
            throw "Unable to locate Horosa project directory under $workspaceRoot"
          }
          "PROJECT_DIR=$($projectDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          Push-Location (Join-Path $env:PROJECT_DIR 'astrostudyui')
          npm ci
          Pop-Location

      - name: Install desktop bundle dependencies
        shell: pwsh
        run: |
          Push-Location (Join-Path $env:GITHUB_WORKSPACE 'desktop_installer_bundle')
          npm ci
          Pop-Location

      - name: Build frontend dist-file
        shell: pwsh
        run: |
          Push-Location (Join-Path $env:PROJECT_DIR 'astrostudyui')
          npm run build:file
          Pop-Location

      - name: Build backend jar
        shell: pwsh
        run: |
          $pomPath = Join-Path $env:PROJECT_DIR 'astrostudysrv\astrostudyboot\pom.xml'
          mvn -f $pomPath -DskipTests package

      - name: Prepare runtime from source
        shell: pwsh
        run: |
          ./prepareruntime/Prepare_Runtime_Windows.ps1 -NoPause

      - name: Build portable release assets
        shell: pwsh
        run: |
          $params = @{
            Version = $env:RELEASE_TAG
          }
          if ($env:GITHUB_EVENT_NAME -eq 'push') {
            $params.RequireTagMatch = $true
          }
          ./desktop_installer_bundle/build_portable_release_zip.ps1 @params

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Horosa Windows Stable ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ./desktop_installer_bundle/release/HorosaPortableWindows-${{ env.RELEASE_TAG }}.zip
            ./desktop_installer_bundle/release/HorosaPortableWindows-${{ env.RELEASE_TAG }}.manifest.json
