name: Horosa Desktop Release

on:
  push:
    tags:
      - '*.*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing git tag to publish or repair
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  release-desktop:
    runs-on: windows-latest

    steps:
      - name: Enable Windows long paths
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          git config --system core.longpaths true

      - name: Checkout repository
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Maven
        shell: pwsh
        run: |
          $mavenVersion = '3.9.9'
          $archiveName = "apache-maven-$mavenVersion-bin.zip"
          $downloadUrl = "https://archive.apache.org/dist/maven/maven-3/$mavenVersion/binaries/$archiveName"
          $toolsRoot = Join-Path $env:RUNNER_TEMP 'maven-tools'
          $archivePath = Join-Path $toolsRoot $archiveName
          $extractRoot = Join-Path $toolsRoot "apache-maven-$mavenVersion"

          New-Item -ItemType Directory -Force -Path $toolsRoot | Out-Null
          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $toolsRoot -Force

          $mvnCmd = Join-Path $extractRoot 'bin/mvn.cmd'
          if (-not (Test-Path $mvnCmd -PathType Leaf)) {
            throw "Maven executable not found after extraction: $mvnCmd"
          }

          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $extractRoot 'bin')
          Add-Content -Path $env:GITHUB_ENV -Value "HOROSA_MVN=$mvnCmd"
          Write-Host "Maven ready: $mvnCmd"

      - name: Show runtime toolchain
        shell: pwsh
        run: |
          Write-Host "python: $(python --version)"
          Write-Host "java: $(java -version 2>&1 | Select-Object -First 1)"
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          Write-Host "maven: $(&$env:HOROSA_MVN -version 2>&1 | Select-Object -First 1)"

      - name: Build backend jar
        shell: pwsh
        run: |
          $workspaceRoot = Join-Path $PWD 'local/workspace'
          $projectDir = Get-ChildItem -Path $workspaceRoot -Directory -ErrorAction Stop |
            Where-Object { Test-Path (Join-Path $_.FullName 'astrostudysrv/astrostudyboot/pom.xml') } |
            Select-Object -First 1
          if (-not $projectDir) {
            throw 'No astrostudyboot Maven project found under local/workspace.'
          }

          $serviceRoot = Join-Path $projectDir.FullName 'astrostudysrv'
          $bootDir = Join-Path $serviceRoot 'astrostudyboot'
          $mvnCandidates = @(
            $env:HOROSA_MVN,
            (Join-Path $PWD 'local/workspace/runtime/windows/maven/bin/mvn.cmd'),
            (Join-Path $PWD 'local/workspace/runtime/windows/maven/bin/mvn.bat')
          )
          $mvn = $mvnCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $mvn) {
            $cmd = Get-Command 'mvn' -ErrorAction SilentlyContinue
            if ($cmd -and $cmd.Source) {
              $mvn = $cmd.Source
            }
          }
          if (-not $mvn) {
            throw 'Maven not found for backend jar build.'
          }

          $moduleOrder = @(
            'boundless',
            'basecomm',
            'image',
            'astrostudy',
            'astrostudycn',
            'astrodeeplearn',
            'astroesp',
            'astroreader',
            'astrostudyboot'
          )

          foreach ($moduleName in $moduleOrder) {
            $moduleDir = Join-Path $serviceRoot $moduleName
            $pomPath = Join-Path $moduleDir 'pom.xml'
            if (-not (Test-Path $pomPath -PathType Leaf)) {
              throw "Required Maven module missing: $pomPath"
            }

            Push-Location $moduleDir
            try {
              $goal = if ($moduleName -eq 'astrostudyboot') { 'package' } else { 'install' }
              Write-Host "Building $moduleName via Maven goal $goal"
              & $mvn -DskipTests $goal
              if ($LASTEXITCODE -ne 0) {
                throw "Maven $goal failed for $moduleName with exit code $LASTEXITCODE"
              }
            } finally {
              Pop-Location
            }
          }

          $jarPath = Join-Path $bootDir 'target/astrostudyboot.jar'
          if (-not (Test-Path $jarPath -PathType Leaf)) {
            throw "Backend jar missing after Maven build: $jarPath"
          }
          Write-Host "Built backend jar: $jarPath"

      - name: Prepare Windows runtime payload
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP 'prepare-runtime.log'
          try {
            & ./prepareruntime/Prepare_Runtime_Windows.ps1 *>&1 | Tee-Object -FilePath $logPath
            if ($LASTEXITCODE -ne 0) {
              throw "Prepare_Runtime_Windows.ps1 exited with code $LASTEXITCODE"
            }
          } catch {
            $message = $_.Exception.Message -replace '\r|\n', ' '
            Write-Output "::error title=Prepare runtime failed::$message"
            if (Test-Path $logPath) {
              Write-Host '---- prepare-runtime log tail ----'
              $tailLines = @(
                Get-Content $logPath -Tail 40 |
                  ForEach-Object { "$_".Trim() } |
                  Where-Object { $_ }
              )
              $tailLines | Write-Host
              $tailLines |
                Select-Object -Last 8 |
                ForEach-Object {
                  $line = $_ -replace '\r|\n', ' '
                  Write-Output "::error title=Prepare runtime tail::$line"
                }
            }
            throw
          }

      - name: Resolve release title
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          version_info = json.loads(Path("desktop_installer_bundle/version.json").read_text(encoding="utf-8"))
          release_tag = os.environ["RELEASE_TAG"]
          release_title = str(version_info.get("release_name") or f"Horosa Desktop {release_tag}")
          runtime_release_tag = str(version_info.get("runtime_release_tag") or release_tag)
          if not release_title.strip():
              release_title = f"Horosa Desktop {release_tag}"
          with open(Path(os.environ["GITHUB_ENV"]), "a", encoding="utf-8") as fh:
              fh.write(f"RELEASE_NAME={release_title}\n")
              fh.write(f"RUNTIME_RELEASE_TAG={runtime_release_tag}\n")

      - name: Write release instructions
        shell: python
        run: |
          import subprocess
          import os
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          repository = os.environ["GITHUB_REPOSITORY"]
          tags = subprocess.check_output(
              ["git", "tag", "--sort=v:refname"],
              text=True,
              encoding="utf-8",
          ).splitlines()
          previous_tag = ""
          if release_tag in tags:
              index = tags.index(release_tag)
              if index > 0:
                  previous_tag = tags[index - 1]

          changelog_lines = []
          if previous_tag:
              changelog_output = subprocess.check_output(
                  ["git", "log", "--no-merges", "--pretty=format:- %s", f"{previous_tag}..{release_tag}"],
                  text=True,
                  encoding="utf-8",
              ).strip()
              if changelog_output:
                  changelog_lines = changelog_output.splitlines()
          if not changelog_lines:
              changelog_lines = [
                  "- 已同步当前版本的 Windows 安装包、运行时包与相关说明资产。",
              ]

          body_path = Path(os.environ["RUNNER_TEMP"]) / "horosa-release-body.md"
          setup_asset = "XingqueSetup.exe"
          offline_setup_asset = "XingqueSetupFull.exe"
          setup_url = f"https://github.com/{repository}/releases/download/{release_tag}/{setup_asset}"
          offline_setup_url = f"https://github.com/{repository}/releases/download/{release_tag}/{offline_setup_asset}"
          portable_asset = f"HorosaPortableWindows-{release_tag}.zip"
          latest_release_url = f"https://github.com/{repository}/releases/latest"
          body_lines = [
              "## 普通用户请这样下载",
              "",
              f"- [轻量在线版安装器]({setup_url})：文件更小，安装时自动下载运行时",
              f"- [大陆离线完整版安装器]({offline_setup_url})：单文件自带运行时，适合网络受限环境",
              f"- [打开最新 Release 页面]({latest_release_url})",
              f"- 常规网络环境下载：`{setup_asset}`",
              f"- 中国大陆或弱网环境优先下载：`{offline_setup_asset}`",
              f"- 不要手动下载：`{portable_asset}`",
              f"- 不要手动下载：`HorosaRuntimeWindows-{release_tag}.zip`",
              f"- 不要手动下载：`HorosaRuntimeWindows-{release_tag}.manifest.json`",
              "",
              "## 普通用户请这样安装和使用",
              "",
              "1. 下载适合你的安装器：轻量在线版 `XingqueSetup.exe`，或大陆离线完整版 `XingqueSetupFull.exe`",
              "2. 直接双击运行这个安装器",
              "3. 按中文安装向导完成安装",
              "4. 安装完成后，从桌面或开始菜单打开 `星阙`",
              "",
              "## 补充说明",
              "",
              "- `XingqueSetup.exe` 是较小的在线安装器",
              "- `XingqueSetupFull.exe` 是自带运行时的离线完整安装器",
              "- 其他 zip 和 manifest 资产主要给安装器与更新链使用",
              "- 轻量在线版首次安装时会自动下载较大的运行时组件",
              "- 离线完整版安装时不需要再额外下载运行时组件",
              "- 普通用户不需要提前安装 Python、Java、Node 或其他开发工具",
              "- 不要手动运行 `.ps1` 脚本",
              "- 安装后的应用里可以使用 `更新 -> 检查更新`",
              "- 用户数据保存在 `%LocalAppData%\\HorosaDesktop`，更新不会清空这些内容",
              "",
              "## 本次版本更新",
              "",
          ]
          body_lines.extend(changelog_lines)
          body_lines.append("")
          body_path.write_text("\n".join(body_lines), encoding="utf-8")
          with open(Path(os.environ["GITHUB_ENV"]), "a", encoding="utf-8") as fh:
              fh.write(f"RELEASE_BODY_PATH={body_path}\n")

      - name: Build portable release assets
        shell: pwsh
        run: |
          $params = @{
            Version = $env:RELEASE_TAG
          }
          if ($env:GITHUB_EVENT_NAME -eq 'push') {
            $params.RequireTagMatch = $true
          }
          ./desktop_installer_bundle/build_portable_release_zip.ps1 @params

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: ${{ env.RELEASE_BODY_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ./desktop_installer_bundle/release/XingqueSetup.exe
            ./desktop_installer_bundle/release/XingqueSetupFull.exe
            ./desktop_installer_bundle/release/HorosaPortableWindows-${{ env.RELEASE_TAG }}.zip
            ./desktop_installer_bundle/release/HorosaRuntimeWindows-${{ env.RELEASE_TAG }}.zip
            ./desktop_installer_bundle/release/HorosaRuntimeWindows-${{ env.RELEASE_TAG }}.manifest.json
